<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akwa Coffee</title>
    <style type="text/css">
        .parent {
          display: grid;
          place-items: center; /* Centers both horizontally and vertically */
          height: 50vh;       /* Gives the container full viewport height */
        }

        .child {
          width: 50%;         /* Or a fixed width like 300px */
          margin: 0 auto;     /* 0 for top/bottom, auto for left/right */
        }

        p {
            font-size: xx-large;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="parent">
        <p>Coming&nbsp;Soon:</br></br>&emsp;&emsp;Akwa&nbsp;Coffee</p>
        <div>
            <h2>2 Organic Blends</h2>
            <ul>
                <li>Amaretto</li>
                <li>Afro Black</li>
            </ul>
        </div>
    </div>
</body>
</html>
